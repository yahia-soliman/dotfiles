#env:
#  TERM: xterm-256color

window:
  padding:
    x: 0
    y: 0
  decoration: none
  opacity: 1


key_bindings:
  - { key: Copy,                             action: Copy  }
  - { key: Paste,                            action: Paste  }
  - { key: P,        mods: Control|Shift,    action: Paste  }
  - { key: Y,        mods: Control|Shift,    action: Copy   }


font:
  size: 7.5
  #  normal:
  #    family: SplineSansMono
  #    style: Medium
  #  bold:
  #    family: SplineSansMono
  #    style: Bold
  #  italic:
  #    family: SplineSansMono
  #    style: Italic
  normal:
    family: terminal-font
    style: SemiBold

  bold:
    family: terminal-font
    style: ExtraBold

  italic:
    family: terminal-font
    style: Italic

  bold_italic:
    family: terminal-font
    style: Bold Italic


# Colors (Gruvbox light)
colors:
  # Default colors
  primary:
    hard contrast: background = '0xf9f5d7'
    background: '0xfbf1c7'
    soft contrast: background = '0xf2e5bc'
    foreground: '0x3c3836'

  # Normal colors
  normal:
    black:   '0xfbf1c7'
    red:     '0xcc241d'
    green:   '0x98971a'
    yellow:  '0xd79921'
    blue:    '0x458588'
    magenta: '0xb16286'
    cyan:    '0x689d6a'
    white:   '0x7c6f64'

  # Bright colors
  bright:
    black:   '0x928374'
    red:     '0x9d0006'
    green:   '0x79740e'
    yellow:  '0xb57614'
    blue:    '0x076678'
    magenta: '0x8f3f71'
    cyan:    '0x427b58'
    white:   '0x3c3836'


